<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="EventCrafter" />
    <meta name="theme-color" content="#FF6B35" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Marketplace des prestataires événementiels au Cameroun. Trouvez photographes, traiteurs, DJ, décorateurs et plus encore." />

    <!-- Open Graph -->
    <meta property="og:title" content="EventCrafter — Marketplace Événementiel Cameroun" />
    <meta property="og:description" content="Trouvez les meilleurs prestataires pour votre mariage, anniversaire ou événement corporatif." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=1200&q=80" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.ico" />

    <title>EventCrafter — Marketplace Événementiel</title>

    <!-- External preconnects removed for mobile network compatibility (MTN/Orange Cameroun) -->

    <style>
      /* Prevent bounce scroll on iOS */
      html, body {
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }
      /* Safe area support (iPhone notch, home indicator) */
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      /* Remove tap highlight on mobile */
      * {
        -webkit-tap-highlight-color: transparent;
      }
      /* Prevent text size adjustment */
      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
      /* Fallback systèmes pendant chargement fonts (évite FOIT/FOUT) */
      body {
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      .font-\[\'Inter\'\], .font-inter {
        font-family: Inter, system-ui, -apple-system, sans-serif;
      }
      .font-\[\'Poppins\'\], .font-poppins {
        font-family: Poppins, 'Arial Black', system-ui, sans-serif;
      }
      /* Éviter layout shift du root pendant hydratation */
      #root:empty {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
